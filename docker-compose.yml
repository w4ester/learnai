services:
  db:
    image: pgvector/pgvector:pg16
    container_name: learnai-db
    environment:
      POSTGRES_USER: learnai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-learnai}
      POSTGRES_DB: learnaidb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnai -d learnaidb"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  api:
    build: ./backend
    container_name: learnai-api
    env_file: ./.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:9848:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_MODE=${AUTH_MODE}
      - MODEL_PROVIDER=${MODEL_PROVIDER}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/auth/me')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build: ./frontend
    container_name: learnai-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:9180:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
