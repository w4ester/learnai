# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

# Bot user-agent map
map $http_user_agent $is_bot {
  default 0;
  # AI training crawlers
  ~*GPTBot 1;
  ~*ChatGPT-User 1;
  ~*CCBot 1;
  ~*anthropic 1;
  ~*Claude-Web 1;
  ~*Google-Extended 1;
  ~*Bytespider 1;
  # Social media crawlers
  ~*facebookexternalhit 1;
  ~*Twitterbot 1;
  ~*LinkedInBot 1;
  ~*Slackbot 1;
  ~*WhatsApp 1;
  ~*TelegramBot 1;
  ~*Discordbot 1;
  # SEO/scraper bots
  ~*AhrefsBot 1;
  ~*SemrushBot 1;
  ~*MJ12bot 1;
  ~*DotBot 1;
  ~*PetalBot 1;
  # Scraping frameworks
  ~*Scrapy 1;
  ~*HTTrack 1;
  ~*WebCopier 1;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Block bots
  if ($is_bot) { return 403; }

  # Security headers
  add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Block sensitive paths
  location ~ /\..* { return 404; }
  location ~* \.(env|bak|backup|sql|log|ini|conf|yml|yaml|toml|lock)$ { return 404; }
  location ~* (wp-admin|wp-login|wp-config|xmlrpc\.php) { return 404; }
  location ~* (phpmyadmin|adminer|dbadmin|myadmin) { return 404; }
  location ~* (shell\.php|cmd\.php|eval\.php|exec\.php) { return 404; }
  location ~* \.(htaccess|htpasswd|pem|key|crt|csr|p12|pfx)$ { return 404; }

  # Health check for Docker
  location /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # API proxy
  location /api/ {
    limit_req zone=api_limit burst=20 nodelay;
    client_max_body_size 100m;

    if ($request_method = OPTIONS) {
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
      add_header 'Access-Control-Max-Age' 86400;
      add_header 'Content-Length' 0;
      add_header 'Content-Type' 'text/plain; charset=utf-8';
      return 204;
    }

    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

    proxy_pass http://api:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
  }

  # Static assets — long cache
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    limit_req zone=general burst=50 nodelay;
    try_files $uri $uri/ /index.html;
  }

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
